# Air live-reload config. See https://github.com/air-verse/air
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd"
  bin = "./tmp/server"
  include_ext = ["go"]
  exclude_dir = ["tmp", "bin", "data", ".git"]
  delay = 800
  stop_on_error = true
  send_interrupt = true
  kill_delay = "2s"

[log]
  time = true

[misc]
  clean_on_exit = true
